# =====================================================================
# Add this view to your Golf Range Matrix Lovelace dashboard.
#
# Prereqs:
#   - Mosquitto MQTT broker running on HA (default add-on).
#   - This analyzer is running on the sim PC and connected to that broker.
#   - The analyzer auto-publishes MQTT discovery, so HA already has:
#       switch.golf_swing_analyzer_swing_analyzer
#       sensor.golf_swing_analyzer_last_swing_club
#       sensor.golf_swing_analyzer_last_swing_player
#       sensor.golf_swing_analyzer_last_swing_body_summary
#       sensor.golf_swing_analyzer_last_swing_faults
#       sensor.golf_swing_analyzer_last_swing_summary
#       sensor.golf_swing_analyzer_last_swing_annotated_url
#       sensor.golf_swing_analyzer_last_swing_raw_url
#       sensor.golf_swing_analyzer_last_swing_timestamp
#   - /golf_range_matrix/golf-range-matrix-cards.js is registered as a
#     Lovelace module resource for custom:range-swing-video-card.
# =====================================================================

title: Swing Analyzer
path: swing-analyzer
icon: mdi:golf-tee
cards:
  # ---- Header / control row -------------------------------------------------
  - type: horizontal-stack
    cards:
      - type: entity
        entity: switch.golf_swing_analyzer_swing_analyzer
        name: Swing Analyzer
        icon: mdi:video-vintage
        state_color: true
        tap_action:
          action: toggle
      - type: entity
        entity: sensor.golf_swing_analyzer_last_swing_club
        name: Last Club
        icon: mdi:golf
      - type: entity
        entity: sensor.golf_swing_analyzer_last_swing_player
        name: Player
        icon: mdi:account
      - type: entity
        entity: sensor.golf_swing_analyzer_last_swing_timestamp
        name: When
        icon: mdi:clock-outline

  # ---- Annotated video ------------------------------------------------------
  - type: custom:range-swing-video-card
    title: Last Swing
    grid_options:
      columns: full
      rows: 10

  # ---- Body summary + faults + AI coach -------------------------------------
  - type: grid
    columns: 2
    square: false
    cards:
      - type: entities
        title: Body summary
        entities:
          - entity: sensor.golf_swing_analyzer_last_swing_body_summary
            name: Pose
          - entity: sensor.golf_swing_analyzer_last_swing_faults
            name: Detected faults
      - type: markdown
        title: Coaching note
        content: >
          {{ states('sensor.golf_swing_analyzer_last_swing_summary') }}

  # ---- Trigger card ---------------------------------------------------------
  - type: markdown
    content: >
      **How to use:** Flip the **Swing Analyzer** switch above to ON before
      you swing. The next shot detected by Nova will save a replay clip in OBS,
      run pose analysis, and update this view. Flip it OFF when you're done so
      practice shots don't fill up your disk.
