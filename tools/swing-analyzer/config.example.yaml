# Golf Swing Analyzer config - example.
# Copy this to config.yaml and fill in the values for your setup.

paths:
  raw_video_dir: "C:/golf_swings/raw"
  annotated_video_dir: "C:/golf_swings/annotated"
  shot_data_dir: "C:/golf_swings/shot_data"
  analysis_dir: "C:/golf_swings/analysis"

matching:
  max_time_difference_seconds: 15
  wait_for_video_seconds: 25

retention:
  keep_recent_swings: 5

camera:
  angle: "down_the_line"
  fps_sample_rate: 2

annotation:
  slow_motion_factor: 0.5
  # When true, the annotated MP4 is rendered as a side-by-side composite:
  # raw video on the left, AI body-mapping overlays on the right. The HA
  # "Last Swing" card just plays the one MP4 and you see both views in
  # the same player. Set false to render the analyzed view only.
  side_by_side: true
  overlays:
    advanced: true
    pelvis_depth_line: true
    spine_inclination_line: true
    head_box: true
    shoulder_plane_trace: true
    hand_path_trace: true

server:
  host: "0.0.0.0"
  port: 8765
  public_base_url: "http://CHANGE-ME:8765"

obs:
  enabled: true
  host: "127.0.0.1"
  port: 4455
  password: "CHANGE-ME"
  save_replay_on_shot: true

mqtt:
  enabled: true
  host: "CHANGE-ME"
  port: 1883
  username: "mqtt_swing"
  password: "CHANGE-ME"
  client_id: "golf_swing_analyzer"
  shot_topic: "golf/shot/raw"
  context_topic: "golf/context/current"
  enable_topic: "golf/swing/analyzer/enabled"
  result_prefix: "golf/swing/analysis"
  discovery_prefix: "homeassistant"
  device_name: "Golf Swing Analyzer"
  device_id: "golf_swing_analyzer"

llm:
  enabled: false
  endpoint: "http://localhost:11434/api/generate"
  model: "trinity"
  timeout_seconds: 60

# Optional: copy each freshly-rendered annotated MP4 into one or more
# destinations. Typically used to publish clips through Home Assistant so
# the Last Swing dashboard card loads from a stable URL that works on the
# home network AND through Nabu Casa.
#
# Setup with HAOS:
#   1. Install the official "Samba share" add-on in HA and start it.
#   2. From the SIM PC, open Explorer and confirm \\homeassistant\config
#      and \\homeassistant\media are reachable.
#   3. Make the destination folders once:
#        \\homeassistant\config\www\golf_replays    (served at /local/...)
#        \\homeassistant\media\golf_replays         (HA Media Browser)
#
# When a destination defines public_url_prefix, that prefix replaces
# server.public_base_url for the published annotated_url. With "/local/..."
# the URL is served by HA itself, so it works locally and via Nabu Casa
# without any auth tokens.
#
# Older clips beyond keep_last are deleted in each destination right after
# a successful copy.
archive:
  enabled: false
  keep_last: 5
  filename_template: "swing_{timestamp}_{original}"
  destinations:
    # Served at /local/golf_replays/<file>. Use this for the HA dashboard.
    - path: '\\homeassistant\config\www\golf_replays'
      public_url_prefix: "/local/golf_replays"
    # Browsable in HA Media Browser; also reachable via Nabu Casa.
    - path: '\\homeassistant\media\golf_replays'
